<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F7F5F0"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="#E86C26"/>

  <!-- Logo -->
  <text x="80" y="120" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="36" fill="#1A1A1A">orcanaut.</text>

  <!-- Headline -->
  <text x="80" y="260" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="64" fill="#1A1A1A">AI Agents That Do</text>
  <text x="80" y="340" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="64" fill="#E86C26">Your Processes</text>

  <!-- Description -->
  <text x="80" y="420" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#1A1A1A" opacity="0.55">Connect your tools. Define workflows.</text>
  <text x="80" y="458" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#1A1A1A" opacity="0.55">Agents reason, execute, get approval, and learn.</text>

  <!-- Pipeline pills -->
  <!-- connect -->
  <rect x="80" y="520" rx="14" ry="14" width="100" height="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="130" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">CONNECT</text>
  <!-- arrow -->
  <text x="193" y="539" font-family="Inter, sans-serif" font-size="14" fill="#1A1A1A" fill-opacity="0.2">›</text>
  <!-- reason -->
  <rect x="208" y="520" rx="14" ry="14" width="86" height="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="251" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">REASON</text>
  <!-- arrow -->
  <text x="307" y="539" font-family="Inter, sans-serif" font-size="14" fill="#1A1A1A" fill-opacity="0.2">›</text>
  <!-- execute -->
  <rect x="322" y="520" rx="14" ry="14" width="96" height="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="370" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">EXECUTE</text>
  <!-- arrow -->
  <text x="431" y="539" font-family="Inter, sans-serif" font-size="14" fill="#1A1A1A" fill-opacity="0.2">›</text>
  <!-- approve -->
  <rect x="446" y="520" rx="14" ry="14" width="96" height="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="494" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">APPROVE</text>
  <!-- arrow -->
  <text x="555" y="539" font-family="Inter, sans-serif" font-size="14" fill="#1A1A1A" fill-opacity="0.2">›</text>
  <!-- learn -->
  <rect x="570" y="520" rx="14" ry="14" width="76" height="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="608" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#1A1A1A" fill-opacity="0.5" text-anchor="middle">LEARN</text>
  <!-- arrow -->
  <text x="659" y="539" font-family="Inter, sans-serif" font-size="14" fill="#1A1A1A" fill-opacity="0.2">›</text>
  <!-- deliver -->
  <rect x="674" y="520" rx="14" ry="14" width="90" height="28" fill="#E86C26" fill-opacity="0.1" stroke="#E86C26" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="719" y="539" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#E86C26" text-anchor="middle">DELIVER</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="#1A1A1A" fill-opacity="0.3" text-anchor="end">orcanaut.com</text>
</svg>
